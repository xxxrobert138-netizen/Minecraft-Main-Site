<html>
    <head>
        <style>
            .banner {
                background-image: url('https://raw.githubusercontent.com/xxxrobert138-netizen/Minecraft-Main-Site/refs/heads/main/banner.png');
                background-position: center center;
                background-repeat: no-repeat;
                background-size: cover;
                width: 100%;
                height: 200px;
                position: relative;
            }
            .logo-container {
                position: absolute;
                bottom: 0;
                left: 20%;
                transform: translate(-50%, 50%);
                border-radius: 20%;
                width: 200px;
                height: 200px;
                background-color: #333;
                border: 4px solid #fff;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            }
            .logo {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 20%;
            }
            .main {
                margin: 0; 
                padding: 120px 5% 40px 5%;
                text-align: left; 
                display: flex;
                flex-direction: row; 
                justify-content: space-between; 
                align-items: flex-start;
                max-width: 100%; 
            }

            .buttons-container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                align-items: flex-end;
            }
            .discord-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background-color: #5865F2;
                color: #ffffff;
                text-decoration: none;
                padding: 12px 30px;
                font-size: 18px;
                font-weight: bold;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
                transition: all 0.2s ease-in-out;
                margin-top: 15px;
            }
            .discord-btn:hover {
                background-color: #4752C4;
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
            }
            .discord-btn:active {
                transform: translateY(1px);
            }
            .button-copy {
                background-color: #4F46E5;
                color: #FFFFFF;
                padding: 12px 24px;
                font-size: 16px;
                font-weight: 500;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s ease;
                box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
            }

            .simple-btn:hover {
                background-color: #4338CA;
                transform: translateY(-1px);
            }


            .simple-btn:active {
                transform: translateY(1px);
            }
        </style>
        <script>
            function copyText(text) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        alert("Текст успешно скопирован!");
                    })
                    .catch(err => {
                        console.error("Ошибка при копировании: ", err);
                    });
            }
        </script>
    </head>
    <body>
        <div class="banner">
            <div class="logo-container">
                <img class="logo" src="https://raw.githubusercontent.com/xxxrobert138-netizen/Minecraft-Main-Site/refs/heads/main/logo.png">
            </div>
        </div>
        <div class="main">
            <div>
                Удачной игры!
            </div>
            <div class="buttons-container">
                <button class="button-copy" onclick="copyText('mexico-sonic.gl.joinmc.link')">Адрес для ПК</button>
                <button class="button-copy" onclick="copyText('lines-forces.gl.at.ply.gg:18705')">Адрес для Телефона</button>
                <a href="https://discord.gg/Gexn8Quuf" class="discord-btn">
                Discord
                </a>
                <a href="https://millida.net/rating/servers/arus" target="_blank" rel="noopener" title="ARUS в рейтинге Millida" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:#5ec64d;color:#0b0b0c;font:700 14px/1 Arial,sans-serif;text-decoration:none;">★ Мы в рейтинге Millida</a>
            </div>
        </div>
    </body>
</html>
